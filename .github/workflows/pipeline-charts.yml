name: Pipeline - NOAA Charts to PMTiles

on:
  schedule:
    # Every Monday at 6:00 UTC (NOAA updates weekly on Thursdays)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # FR33: Manual trigger for re-execution

permissions: {}

jobs:
  build-and-publish:
    name: Download, Convert, Validate & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install system dependencies (GDAL, rclone)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin rclone

      - name: Install Tippecanoe from source
        run: |
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --branch 2.75.0 --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe
          make -j$(nproc)
          sudo make install
          tippecanoe --version

      - name: Download NOAA ENC data
        run: bash pipeline/charts/download-noaa.sh

      - name: Convert S-57 to GeoJSON
        run: bash pipeline/charts/convert-s57.sh

      - name: Generate PMTiles
        run: bash pipeline/charts/generate-tiles.sh

      - name: Validate tiles
        run: npx tsx pipeline/validate/validate-tiles.ts

      - name: Upload to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: bash pipeline/charts/upload-cdn.sh

      - name: Generate and upload manifest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: npx tsx pipeline/manifest/generate-manifest.ts

      - name: Upload pipeline logs as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: pipeline/tmp/
          retention-days: 14

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Send failure notification
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner,
              repo,
              title: `[Pipeline] NOAA Charts pipeline failed - Run #${context.runNumber}`,
              body: `## Pipeline Failure\n\nThe NOAA Charts pipeline failed.\n\n**Run:** ${runUrl}\n**Date:** ${new Date().toISOString()}\n\nPlease check the logs for details.`,
              labels: ['pipeline', 'bug']
            });
